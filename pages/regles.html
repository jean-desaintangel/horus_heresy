<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Règles spéciales</title>
    <meta
      name="description"
      content="Référence rapide des règles spéciales Horus Heresy 3e édition : règles d'armes (Sonner, Brèche, Fusion...) et règles diverses (Frappe en profondeur, Peur...), avec recherche instantanée."
    />
    <!-- Polices auto-hébergées via css/style.css (RGPD : aucune requête
         vers Google Fonts) ; préchargement de la police du texte courant. -->
    <link
      rel="preload"
      href="../assets/fonts/lato-latin-400-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="icon" type="image/png" href="../assets/img/eye-of-horus.png" />
    <!-- Open Graph (og:image absolue à compléter à la mise en ligne) -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_FR" />
    <meta
      property="og:title"
      content="Règles spéciales — Horus Heresy, guide d’initiation"
    />
    <meta
      property="og:description"
      content="Référence rapide des règles spéciales Horus Heresy 3e édition, avec recherche instantanée."
    />
    <script src="../js/main.js" defer></script>
    <script src="../js/regles-data.js" defer></script>
    <script src="../js/regles.js" defer></script>
  </head>
  <body>
    <a class="lien-evitement" href="#contenu">Aller au contenu principal</a>
    <!-- ===================== NAVIGATION ===================== -->
    <header class="nav">
      <div class="nav-inner">
        <a class="nav-logo" href="../index.html"
          >Horus Heresy <span>· Guide d’initiation</span></a
        >
        <button
          class="nav-burger"
          aria-label="Ouvrir le menu"
          aria-expanded="false"
        >
          ☰
        </button>
        <nav class="nav-principale" aria-label="Navigation principale">
          <ul class="nav-menu"></ul>
        </nav>
      </div>
    </header>

    <main id="contenu">
      <h1 class="section-titre section-titre--centre titre-page">
        Règles spéciales
      </h1>

      <!-- Barre de recherche : le filtre est géré par js/regles.js -->
      <label for="recherche" class="sr-only">Rechercher une règle</label>
      <input
        type="text"
        id="recherche"
        class="barre-recherche"
        placeholder="Rechercher une règle… (ex : fusion, peur, brèche)"
        autocomplete="off"
      />
      <p
        class="compteur-resultats"
        id="compteur"
        role="status"
        aria-live="polite"
        aria-atomic="true"
      ></p>

      <div class="encadre">
        <p>
          <strong>Rappel :</strong> ces tables sont une retranscription
          manuelle, mais c’est le livre de règles qui fait référence en cas de
          doute.
        </p>
      </div>

      <!-- ===================== RÈGLES D’ARMES =====================
           Les h2 rétablissent la hiérarchie de titres (h1 > h2 > h3 :
           les cartes générées par js/regles.js sont des h3) et donnent
           un intitulé perceptible à chaque section. Le filtre de
           recherche masque le groupe entier (titre compris) quand
           aucune règle ne correspond. -->
      <section class="groupe-regles" id="armes">
        <h2 class="section-titre">Règles d’armes</h2>
        <!-- Les cartes de règles sont générées par js/regles.js -->
        <div id="regles-armes"></div>
      </section>

      <!-- ===================== RÈGLES DIVERSES ===================== -->
      <section class="groupe-regles" id="diverses">
        <h2 class="section-titre">Règles diverses</h2>
        <div id="regles-diverses"></div>
      </section>
    </main>

    <footer></footer>
  </body>
</html>
