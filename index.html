<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guide d’initiation</title>
    <meta
      name="description"
      content="Guide d'initiation pour le jeu de figurines Horus Heresy 3e édition : construction d'armée, déroulement d'un tour, tables de référence et règles spéciales."
    />
    <!-- Polices Cinzel (titres) et Lato (texte) auto-hébergées via
         css/style.css : aucune requête vers Google Fonts, donc aucune
         IP de visiteur transmise à un tiers (RGPD / CNIL). On précharge
         la police du texte courant pour un premier rendu sans bascule. -->
    <link
      rel="preload"
      href="assets/fonts/lato-latin-400-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/png" href="assets/img/eye-of-horus.png" />
    <!-- Métadonnées de partage (Open Graph) pour Discord, forums...
         og:image exige une URL ABSOLUE : compléter avec le domaine
         définitif au moment de la mise en ligne. -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:title" content="Horus Heresy — Guide d’initiation" />
    <meta
      property="og:description"
      content="Guide non officiel pour Horus Heresy 3e édition : construction d'armée, phases de jeu, tables de référence et règles spéciales."
    />
    <!-- defer : téléchargé en parallèle du parsing, exécuté après le DOM.
         L'ordre des balises est préservé entre scripts defer. -->
    <script src="js/main.js" defer></script>
  </head>
  <body>
    <a class="lien-evitement" href="#contenu">Aller au contenu principal</a>
    <!-- ===================== NAVIGATION ===================== -->

        >

          class="nav-burger"
          aria-label="Ouvrir le menu"
          aria-expanded="false"
        >
          ☰
        </button>
        <nav class="nav-principale" aria-label="Navigation principale">
          <ul class="nav-menu"></ul>
        </nav>
      </div>
    </header>

    <main class="main-accueil" id="contenu">
      <!-- ===================== HERO ===================== -->
      <section class="hero">
        <div class="hero-texte">
          <h1>Guide d’initiation</h1>
          <p class="devise">Horus Heresy 3<sup>e</sup> édition</p>
        </div>
        <div class="hero-image">
          <!-- WebP (−93 % vs le PNG d'origine).
               width/height : le navigateur réserve l'espace avant le
               chargement et évite le décalage de mise en page (CLS). -->
          <img
            src="assets/img/hero.webp"
            width="800"
            height="1219"
            alt="Un Adeptus Astartes en armure, arme au poing, sur un champ de bataille en flammes"
          />
        </div>
      </section>
    </main>

    <!-- ===================== PIED DE PAGE ===================== -->

https://jean-desaintangel.github.io/horus_heresy/ -->
